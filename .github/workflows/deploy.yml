name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy (default: main)"
        required: false
        default: main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.inputs.deploy_branch || github.ref_name }}
        with:
          host: 69.63.197.80
          port: 6022
          username: lsl
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,DEPLOY_BRANCH
          command_timeout: 10m
          script: bash ${DEPLOY_PATH}/scripts/deploy/update_and_restart.sh
